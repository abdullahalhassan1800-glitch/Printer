<header>
  <div class="container">
    <a href="{{ site.baseurl }}/" class="logo"><img src="{{ site.baseurl }}/images/logo.svg" alt="{{ site.title }}"></a>
    <nav>
      <button class="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        {% assign current_url = page.url %}
        <li><a href="{{ site.baseurl }}/" {% if current_url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ site.baseurl }}/about/" {% if current_url == '/about/' %}class="active"{% endif %}>About</a></li>
        <li><a href="{{ site.baseurl }}/services/" {% if current_url == '/services/' %}class="active"{% endif %}>Services</a></li>
        <li><a href="{{ site.baseurl }}/blog/" {% if current_url contains '/blog/' %}class="active"{% endif %}>Blog</a></li>
        <li><a href="{{ site.baseurl }}/contact/" {% if current_url == '/contact/' %}class="active"{% endif %}>Contact</a></li>
        <li><div class="header-support"><i class="fas fa-clock"></i> 24X7 <span>Support</span></div></li>
      </ul>
    </nav>
  </div>
</header>
