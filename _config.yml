title: Printer Services Pro
description: Independent printer industry analysis, enterprise printing guides, and business printing comparisons. Helping organizations choose the right printing infrastructure.
url: "https://printerandservices.pro"
baseurl: ""

future: true

permalink: /blog/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /blog/:title/
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      footer_variant: "legal"

plugins:
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - pages-body.json
