---
layout: default
footer_variant: legal
---

<section class="blog-post">
  <div class="container">
    <div class="blog-post-header">
      {% if page.categories %}
      <span class="blog-tag">{{ page.categories | first }}</span>
      {% endif %}
      <h1>{{ page.title }}</h1>
      <div class="blog-meta">
        <span><i class="fas fa-user"></i> {{ site.title }} Team</span>
        <span><i class="fas fa-calendar"></i> {{ page.date | date: "%B %d, %Y" }}</span>
        <span><i class="fas fa-clock"></i> {{ page.read_time | default: "5" }} min read</span>
      </div>
    </div>

    {% if page.image %}
    <div class="blog-post-image">
      <img src="{{ site.baseurl }}{{ page.image }}" alt="{{ page.title }}" onerror="this.style.display='none'">
    </div>
    {% endif %}

    <div class="blog-post-content">
      {{ content }}
    </div>
  </div>
</section>
